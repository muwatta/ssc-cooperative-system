<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f6f7f9;
      margin: 0;
      padding: 0;
      color: #111827;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .header {
      background: #0f172a;
      color: #ffffff;
      padding: 24px 30px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .header span {
      color: #60a5fa;
    }
    .content {
      padding: 30px;
      font-size: 15px;
      line-height: 1.7;
      color: #1f2937;
    }
    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 28px;
      background: #2563eb;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    .button:hover {
      background: #1d4ed8;
    }
    .footer {
      font-size: 13px;
      color: #6b7280;
      padding: 20px 30px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
      background: #fafafa;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: #f3f4f6;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-security {
      background: #fef2f2;
      color: #dc2626;
    }
    .badge-success {
      background: #f0fdf4;
      color: #16a34a;
    }
    .badge-warning {
      background: #fffbeb;
      color: #d97706;
    }
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 20px 0;
    }
    .link-break {
      word-break: break-all;
      color: #2563eb;
      font-size: 13px;
      background: #f8fafc;
      padding: 8px 12px;
      border-radius: 4px;
      display: block;
      margin: 8px 0;
    }
    @media only screen and (max-width: 600px) {
      .container {
        margin: 10px;
        border-radius: 8px;
      }
      .content {
        padding: 20px;
        font-size: 14px;
      }
      .header {
        padding: 18px 20px;
        font-size: 16px;
      }
      .button {
        display: block;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <span>SSC</span> Cooperative System
    </div>

    <div class="content">
      {% block content %}{% endblock %}
    </div>

    <div class="footer">
      <p style="margin:0 0 8px 0;font-size:12px;color:#9ca3af;">
        SSC Cooperative System will never ask for your password via email.
      </p>
      <p style="margin:0;font-size:12px;">
        This is an automated message. Please do not reply.<br/>
        &copy; {{year}} SSC Cooperative
      </p>
    </div>
  </div>
</body>
</html>
